version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels: [dependencies, ci]

  - package-ecosystem: cargo
    directory: /
    target-branch: main
    schedule:
      interval: monthly
      day: monday
      time: "10:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      cargo-non-major:
        update-types: [minor, patch]
    labels: [dependencies, rust]
