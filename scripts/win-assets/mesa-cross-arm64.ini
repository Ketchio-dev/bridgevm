# Meson cross file for Windows-on-ARM64 Mesa payloads on an x64 Windows host.
# Native build tools remain x64; host binaries are produced for ARM64 and are
# therefore never executed during configuration.

[binaries]
c = ['clang-cl', '--target=arm64-pc-windows-msvc']
cpp = ['clang-cl', '--target=arm64-pc-windows-msvc']
c_ld = 'lld-link'
cpp_ld = 'lld-link'
ar = 'llvm-lib'
strip = 'llvm-strip'
windres = 'llvm-rc'

[host_machine]
system = 'windows'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
